{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
<div class="container mt-3 mb-3">
  <h1>{{title}}</h1>
  <hr>

  <div class="card mt-3">
    <div class="card-header">
      <h3>New Pokemon Form</h3>
    </div>

    <div class="card-body">
      <form method="post">

        <div class="mb-3">
          <label class="form-label">Pokemon Name</label>
          <input name="name" type="text" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Pokemon Weight</label>
          <input name="weight" type="text" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Pokemon Height</label>
          <input name="height" type="text" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Pokemon Type</label>
          <select name="types" class="form-select" multiple size="6" required>
            {% for t in types %}
              <option value="{{ t.id }}">{{ t.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Pokemon Description</label>
          <textarea name="description" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Pokemon Image Url</label>
          <input name="img_url" type="text" class="form-control" required>
        </div>

        <hr>

        <button type="submit" class="btn btn-outline-secondary">
          <i class="bi bi-file-earmark-plus"></i>
          Add New Pokemon
        </button>

      </form>
    </div>
  </div>
</div>
{% endblock %}
